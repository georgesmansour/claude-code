<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading invitation…</title>
<script src="./config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: rgba(255,255,255,.55);
    font-family: 'Jost', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 2rem;
  }
  .msg { font-size: .9rem; letter-spacing: .08em; }
</style>
</head>
<body>
<p class="msg" id="msg">Opening invitation…</p>
<script>
(async () => {
  const params = new URLSearchParams(
    window.location.search.replace(/^\?/, '').replace(/\?/g, '&')
  );
  const id = params.get('id');

  if (!id) {
    document.getElementById('msg').textContent = 'No invitation specified.';
    return;
  }

  try {
    const base = (window.API_BASE || '').replace(/\/$/, '');
    const res  = await fetch(`${base}/api/public/invitations/${encodeURIComponent(id)}`, {
      headers: { Accept: 'application/json' }
    });

    if (!res.ok) {
      document.getElementById('msg').textContent = 'Invitation not found.';
      return;
    }

    const inv = await res.json();
    // templateKey comes from the API (derived from template name, e.g. "classic-wedding")
    const key = (inv.templateKey || 'classic-wedding').toLowerCase().replace(/\s+/g, '-');

    // Preserve all original query params so ?np=N and any future params survive
    params.set('id', id);
    window.location.replace(`/${key}?${params.toString()}`);

  } catch {
    document.getElementById('msg').textContent = 'Could not load invitation. Please check your connection.';
  }
})();
</script>
</body>
</html>
