<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading invitation…</title>
<script src="./config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: rgba(255,255,255,.55);
    font-family: 'Jost', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 2rem;
  }
  .msg { font-size: .9rem; letter-spacing: .08em; }
</style>
</head>
<body>
<p class="msg" id="msg">Opening invitation…</p>
<script>
(async () => {
  const params = new URLSearchParams(
    window.location.search.replace(/^\?/, '').replace(/\?/g, '&')
  );

  // Personal guest link comes either as a pretty path (/invite/charbel-nahhas)
  // or the legacy query form (?g=<slug-or-token>).
  const pathMatch = window.location.pathname.match(/\/invite\/([^/?#]+)/);
  const guestKey  = pathMatch ? decodeURIComponent(pathMatch[1]) : params.get('g');
  const id        = params.get('id');

  if (!id && !guestKey) {
    document.getElementById('msg').textContent = 'No invitation specified.';
    return;
  }

  try {
    const base = (window.API_BASE || '').replace(/\/$/, '');
    const url = guestKey
      ? `${base}/api/public/guest/${encodeURIComponent(guestKey)}`
      : `${base}/api/public/invitations/${encodeURIComponent(id)}`;
    const res = await fetch(url, { headers: { Accept: 'application/json' } });

    if (!res.ok) {
      document.getElementById('msg').textContent = 'Invitation not found.';
      return;
    }

    const inv = await res.json();
    // templateKey comes from the API (derived from template name, e.g. "classic-wedding")
    const key = (inv.templateKey || 'classic-wedding').toLowerCase().replace(/\s+/g, '-');

    // Build the target query, preserving personalization params (np, name, spouse, max, gn).
    const target = new URLSearchParams(params);
    target.delete('g');
    target.delete('id');
    if (guestKey) target.set('g', guestKey);
    else          target.set('id', id);

    // Navigate straight to the real template FILE (.html) rather than an extensionless
    // path. This never depends on a server rewrite, so the page loads on the first try
    // every time — no hard refresh needed.
    window.location.replace(`/${key}.html?${target.toString()}`);

  } catch {
    document.getElementById('msg').textContent = 'Could not load invitation. Please check your connection.';
  }
})();
</script>
</body>
</html>
