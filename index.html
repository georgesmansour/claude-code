<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Invitation Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5b0;
    --gold-dark: #9a7a4a;
    --cream: #faf7f2;
    --dark: #1a1614;
    --text: #3a3330;
    --muted: #8a7f78;
    --white: #ffffff;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0e0c0b;
    font-family: 'Jost', sans-serif;
  }

  /* ── CARD STACK ── */
  #app {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .card-wrap {
    width: 100%; max-width: 420px;
    height: 100%; max-height: 820px;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 40px 120px rgba(0,0,0,.7);
  }

  .page {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: transform .65s cubic-bezier(.77,0,.18,1), opacity .4s ease;
    overflow: hidden;
  }

  .page.active   { transform: translateY(0);    opacity: 1; pointer-events: all; }
  .page.above    { transform: translateY(-100%); opacity: 0; pointer-events: none; }
  .page.below    { transform: translateY(100%);  opacity: 0; pointer-events: none; }

  /* ── OVERLAY GRADIENT ── */
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(14,12,11,.25) 0%, rgba(14,12,11,.55) 60%, rgba(14,12,11,.88) 100%);
    z-index: 1;
  }
  .overlay.deep    { background: linear-gradient(to bottom, rgba(14,12,11,.5) 0%, rgba(14,12,11,.75) 100%); }
  .overlay.deepest { background: linear-gradient(to bottom, rgba(14,12,11,.6) 0%, rgba(14,12,11,.92) 100%); }

  /* ── BG IMAGE ── */
  .bg-img {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    z-index: 0;
    transition: transform 8s ease;
  }
  .page.active .bg-img { transform: scale(1.04); }

  /* ── PAGE CONTENT ── */
  .page-content {
    position: relative; z-index: 2;
    width: 100%; padding: 3rem 2.5rem;
    display: flex; flex-direction: column;
    align-items: center; text-align: center;
    color: var(--white);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    width: 100%; margin: 1.5rem 0;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: .5px; background: rgba(201,169,110,.5);
  }
  .divider-icon { color: var(--gold); font-size: 14px; letter-spacing: 4px; }

  /* ── TYPOGRAPHY ── */
  .label {
    font-family: 'Jost', sans-serif;
    font-size: 10px; font-weight: 400;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold-light); opacity: .85;
    margin-bottom: .75rem;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.6rem, 8vw, 3.4rem);
    font-weight: 300; line-height: 1.1;
    color: var(--white);
  }
  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem; font-weight: 300; font-style: italic;
    color: var(--gold-light); margin-top: .5rem;
  }
  .body-text {
    font-size: .82rem; font-weight: 300; letter-spacing: .5px;
    line-height: 1.9; color: rgba(255,255,255,.75);
  }

  /* ── START BUTTON ── */
  .btn-start {
    margin-top: 2.5rem;
    padding: .85rem 2.8rem;
    border: 1px solid rgba(201,169,110,.6);
    background: rgba(201,169,110,.12);
    color: var(--gold-light);
    font-family: 'Jost', sans-serif;
    font-size: .78rem; font-weight: 400;
    letter-spacing: 4px; text-transform: uppercase;
    border-radius: 2px; cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all .3s ease;
  }
  .btn-start:hover { background: rgba(201,169,110,.28); border-color: var(--gold); color: var(--white); }

  /* ── NAV DOTS ── */
  #dots {
    position: absolute; right: 16px; top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex; flex-direction: column; gap: 8px;
  }
  .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(255,255,255,.3);
    transition: all .3s ease;
    cursor: pointer;
  }
  .dot.active { height: 20px; border-radius: 2px; background: var(--gold); }

  /* ── SWIPE HINT ── */
  .swipe-hint {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: bounce 2s infinite;
  }
  .swipe-hint span { font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,.4); }
  .swipe-arrow { width: 1px; height: 28px; background: linear-gradient(to bottom, transparent, var(--gold)); }
  @keyframes bounce { 0%,100%{ transform: translateX(-50%) translateY(0); } 50%{ transform: translateX(-50%) translateY(6px); } }

  /* ── COUNTDOWN ── */
  .countdown { display: flex; gap: 1.5rem; margin: 1.5rem 0; }
  .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem; font-weight: 300; color: var(--white); line-height: 1;
  }
  .cd-label { font-size: .6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }

  /* ── LOCATION CARD ── */
  .loc-card {
    width: 100%; background: rgba(255,255,255,.07);
    border: .5px solid rgba(201,169,110,.3);
    border-radius: 8px; padding: 1.4rem 1.6rem;
    margin-bottom: 1rem; text-align: left;
    backdrop-filter: blur(10px);
  }
  .loc-time { font-size: .68rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: .4rem; }
  .loc-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; color: var(--white); margin-bottom: .2rem; }
  .loc-addr { font-size: .75rem; color: rgba(255,255,255,.55); margin-bottom: .9rem; }
  .btn-map {
    display: inline-flex; align-items: center; gap: 8px;
    padding: .45rem 1.1rem;
    border: .5px solid rgba(201,169,110,.5);
    border-radius: 2px; background: transparent;
    color: var(--gold-light); font-size: .68rem;
    font-family: 'Jost', sans-serif;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; text-decoration: none;
    transition: all .25s ease;
  }
  .btn-map:hover { background: rgba(201,169,110,.15); }
  .btn-map svg { width: 12px; height: 12px; }

  /* ── GIFT CARD ── */
  .gift-card {
    width: 100%; background: rgba(201,169,110,.08);
    border: .5px solid rgba(201,169,110,.35);
    border-radius: 8px; padding: 1.6rem;
    margin-top: 1rem;
    backdrop-filter: blur(10px);
  }
  .gift-bank { font-family: 'Jost', sans-serif; font-size: .7rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: .5rem; }
  .gift-acc  { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--white); letter-spacing: 2px; }
  .gift-copy {
    margin-top: .8rem;
    background: transparent; border: .5px solid rgba(201,169,110,.4);
    color: var(--gold-light); font-size: .62rem; letter-spacing: 2px;
    text-transform: uppercase; padding: .4rem .8rem; border-radius: 2px;
    cursor: pointer; font-family: 'Jost', sans-serif;
    transition: all .25s ease;
  }
  .gift-copy:hover { background: rgba(201,169,110,.15); color: var(--white); }

  /* ── RSVP FORM ── */
  .rsvp-form { width: 100%; display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
  .form-group { display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .form-label { font-size: .65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
  .form-input, .form-select {
    width: 100%; padding: .7rem 1rem;
    background: rgba(255,255,255,.07);
    border: .5px solid rgba(201,169,110,.3);
    border-radius: 4px; color: var(--white);
    font-family: 'Jost', sans-serif; font-size: .85rem;
    outline: none; appearance: none;
    transition: border-color .25s;
  }
  .form-input::placeholder { color: rgba(255,255,255,.3); }
  .form-input:focus, .form-select:focus { border-color: var(--gold); }
  .form-select option { background: #1a1614; color: #fff; }

  .btn-submit {
    margin-top: .5rem; padding: 1rem;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; border-radius: 4px;
    color: var(--dark); font-family: 'Jost', sans-serif;
    font-size: .75rem; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: opacity .25s;
  }
  .btn-submit:hover { opacity: .85; }

  .success-msg {
    display: none; text-align: center; padding: 2rem;
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif; font-size: 1.5rem;
    font-style: italic; font-weight: 300;
  }

  .page-scroll { overflow-y: auto; max-height: 100%; width: 100%; }
  .page-scroll::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div id="app">
  <div class="card-wrap" id="cardWrap">
    <div id="dots"></div>
  </div>
</div>

<script>
// ── DEFAULT DATA ───────────────────────────────────────
const DEFAULT_DATA = {
  template: 'wedding-classic',
  title: 'Fadi & Mavie',
  cover: {
    enabled: true,
    eventLabel: 'Wedding',
    names: 'Fadi & Mavie',
    tagline: 'Are getting married',
    hostText: 'Chebly and Madi Families',
    hostIntro: 'With heartfelt joy,',
    hostOutro: 'invite you to celebrate',
    image: 'https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=800&q=80',
    buttonText: 'Open Invitation'
  },
  countdown: {
    enabled: true,
    label: 'Save the date',
    date: '2024-08-24',
    description: 'Join us as we begin our forever,\nsurrounded by those we love most.\nYour presence is the greatest gift.',
    image: 'https://images.unsplash.com/photo-1519741497674-611481863552?w=800&q=80'
  },
  locations: {
    enabled: true,
    label: 'The Celebration',
    title: 'Where & When',
    image: 'https://images.unsplash.com/photo-1478147427282-58a87a702b70?w=800&q=80',
    items: [
      { time: '6:30 PM — Ceremony',  name: 'St. Michael Church', addr: 'Bikfaya, Lebanon',       url: 'https://maps.app.goo.gl/LtdauNbSukzWtYPo7' },
      { time: '7:30 PM — Reception', name: 'Blanc De Chêne',     addr: 'Delb, Bikfaya, Lebanon', url: 'https://maps.app.goo.gl/v8F2Rt6wQKC4EBtE7' }
    ]
  },
  gifts: {
    enabled: true,
    label: 'Gift Registry',
    title: 'With Love',
    image: 'https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?w=800&q=80',
    description: 'Your love and presence on our special day\nis the greatest gift of all.\nFor those who wish to give more:',
    items: [
      { bank: 'Whish Money', account: '20822391' }
    ]
  },
  rsvp: {
    enabled: true,
    label: 'Be Our Guest',
    title: 'RSVP',
    image: 'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=800&q=80',
    deadline: 'Please reply before July 24, 2024',
    maxPeople: 10
  },
  customSections: []
};

// ── BASE64URL HELPERS ──────────────────────────────────
function encodeData(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}
function decodeData(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  return JSON.parse(decodeURIComponent(escape(atob(s))));
}

// ── DATA LOADING ───────────────────────────────────────
function mergeDefaults(data) {
  const out = JSON.parse(JSON.stringify(DEFAULT_DATA));
  for (const k of Object.keys(data || {})) {
    if (data[k] && typeof data[k] === 'object' && !Array.isArray(data[k]) && out[k]) {
      out[k] = Object.assign({}, out[k], data[k]);
    } else {
      out[k] = data[k];
    }
  }
  return out;
}

// Tolerant query parser: treats stray "?" as "&" so URLs like
// "?id=foo?np=4" still work even though they aren't strictly valid.
function parseQuery() {
  const raw = window.location.search.replace(/^\?/, '').replace(/\?/g, '&');
  return new URLSearchParams(raw);
}

function loadData() {
  const params = parseQuery();

  const enc = params.get('d');
  if (enc) {
    try { return mergeDefaults(decodeData(enc)); }
    catch (e) { console.warn('Bad ?d payload:', e); }
  }

  const id = params.get('id');
  if (id) {
    try {
      const all = JSON.parse(localStorage.getItem('ic_people') || '{}');
      if (all[id]) return mergeDefaults(all[id].data);
    } catch (e) { console.warn('Bad localStorage:', e); }
  }

  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function getMaxPeopleOverride() {
  const params = parseQuery();
  let val = params.get('np');
  if (!val) {
    const raw = window.location.search.replace(/^\?/, '');
    const m = raw.match(/^np(\d+)$/);
    if (m) val = m[1];
  }
  return val ? parseInt(val) : null;
}

// ── HELPERS ────────────────────────────────────────────
const esc = s => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const nl2br = s => esc(s).replace(/\n/g, '<br>');
const mapIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>';

// ── RENDERERS ──────────────────────────────────────────
function renderCover(c, isFirst) {
  const namesHtml = esc(c.names).replace(' &amp; ', '<br>&amp;<br>');
  return `
    <div class="bg-img" style="background-image: url('${esc(c.image)}')"></div>
    <div class="overlay"></div>
    <div class="page-content">
      ${c.eventLabel ? `<p class="label">${esc(c.eventLabel)}</p>` : ''}
      <div class="divider"><span class="divider-icon">✦ ✦ ✦</span></div>
      <h1 class="title">${namesHtml}</h1>
      ${c.tagline ? `<p class="subtitle">${esc(c.tagline)}</p>` : ''}
      <div class="divider"><span class="divider-icon">✦ ✦ ✦</span></div>
      ${c.hostText ? `<p class="body-text">${esc(c.hostIntro || '')}<br><strong style="color:rgba(255,255,255,.9)">${esc(c.hostText)}</strong><br>${esc(c.hostOutro || '')}</p>` : ''}
      <button class="btn-start" data-action="next">${esc(c.buttonText || 'Open Invitation')}</button>
    </div>
    ${isFirst ? '<div class="swipe-hint"><span>Swipe up</span><div class="swipe-arrow"></div></div>' : ''}
  `;
}

function renderCountdown(c) {
  const dt = new Date(c.date + 'T00:00:00');
  const dateStr = isNaN(dt) ? c.date : dt.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  return `
    <div class="bg-img" style="background-image: url('${esc(c.image)}')"></div>
    <div class="overlay"></div>
    <div class="page-content">
      <p class="label">${esc(c.label || 'Save the date')}</p>
      <h2 class="title" style="font-size:2rem;">${esc(dateStr)}</h2>
      <div class="divider"><span class="divider-icon">✦ ✦ ✦</span></div>
      <div class="countdown" data-countdown="${esc(c.date)}">
        <div class="cd-unit"><span class="cd-num" data-cd="d">0</span><span class="cd-label">Days</span></div>
        <div class="cd-unit"><span class="cd-num" data-cd="h">0</span><span class="cd-label">Hours</span></div>
        <div class="cd-unit"><span class="cd-num" data-cd="m">0</span><span class="cd-label">Min</span></div>
        <div class="cd-unit"><span class="cd-num" data-cd="s">0</span><span class="cd-label">Sec</span></div>
      </div>
      <div class="divider"><span class="divider-icon">✦ ✦ ✦</span></div>
      ${c.description ? `<p class="body-text">${nl2br(c.description)}</p>` : ''}
    </div>
  `;
}

function renderLocations(c) {
  const cards = (c.items || []).map(loc => `
    <div class="loc-card">
      ${loc.time ? `<p class="loc-time">${esc(loc.time)}</p>` : ''}
      ${loc.name ? `<p class="loc-name">${esc(loc.name)}</p>` : ''}
      ${loc.addr ? `<p class="loc-addr">${esc(loc.addr)}</p>` : ''}
      ${loc.url ? `<a class="btn-map" href="${esc(loc.url)}" target="_blank" rel="noopener">${mapIcon} View on Map</a>` : ''}
    </div>
  `).join('');
  return `
    <div class="bg-img" style="background-image: url('${esc(c.image)}')"></div>
    <div class="overlay deep"></div>
    <div class="page-scroll"><div class="page-content" style="min-height:100%;">
      <p class="label">${esc(c.label || 'The Celebration')}</p>
      <h2 class="title" style="font-size:1.8rem; margin-bottom:1.5rem;">${esc(c.title || 'Where & When')}</h2>
      ${cards}
    </div></div>
  `;
}

function renderGifts(c) {
  const cards = (c.items || []).map(g => `
    <div class="gift-card">
      ${g.bank ? `<p class="gift-bank">${esc(g.bank)}</p>` : ''}
      <p class="gift-acc">${esc(g.account)}</p>
      <button class="gift-copy" data-copy="${esc(g.account)}">Copy</button>
    </div>
  `).join('');
  return `
    <div class="bg-img" style="background-image: url('${esc(c.image)}')"></div>
    <div class="overlay"></div>
    <div class="page-scroll"><div class="page-content" style="min-height:100%;">
      <p class="label">${esc(c.label || 'Gift Registry')}</p>
      <h2 class="title" style="font-size:1.9rem;">${esc(c.title || 'With Love')}</h2>
      <div class="divider"><span class="divider-icon">✦</span></div>
      ${c.description ? `<p class="body-text">${nl2br(c.description)}</p>` : ''}
      ${cards}
    </div></div>
  `;
}

function renderCustom(c) {
  return `
    <div class="bg-img" style="background-image: url('${esc(c.image || '')}')"></div>
    <div class="overlay"></div>
    <div class="page-scroll"><div class="page-content" style="min-height:100%;">
      ${c.label ? `<p class="label">${esc(c.label)}</p>` : ''}
      ${c.title ? `<h2 class="title" style="font-size:1.9rem;">${esc(c.title)}</h2>` : ''}
      <div class="divider"><span class="divider-icon">✦</span></div>
      ${c.body ? `<p class="body-text">${nl2br(c.body)}</p>` : ''}
    </div></div>
  `;
}

function renderRsvp(c, maxPeople) {
  const opts = [];
  for (let i = 1; i <= maxPeople; i++) opts.push(`<option value="${i}">${i}</option>`);
  return `
    <div class="bg-img" style="background-image: url('${esc(c.image)}')"></div>
    <div class="overlay deepest"></div>
    <div class="page-scroll"><div class="page-content" style="min-height:100%;">
      <p class="label">${esc(c.label || 'Be Our Guest')}</p>
      <h2 class="title" style="font-size:1.9rem;">${esc(c.title || 'RSVP')}</h2>
      ${c.deadline ? `<p class="body-text" style="margin-top:.5rem;">${esc(c.deadline)}</p>` : ''}
      <div class="rsvp-form" data-rsvp>
        <div class="form-group">
          <label class="form-label">Attendance</label>
          <select class="form-select" data-attending>
            <option value="">— Select —</option>
            <option value="yes">Yes, attending</option>
            <option value="no">Not attending</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Number of attendees</label>
          <select class="form-select" data-num-attendees>
            <option value="">— Select —</option>
            ${opts.join('')}
          </select>
        </div>
        <div data-name-fields></div>
        <button class="btn-submit" data-submit-rsvp>Confirm RSVP</button>
      </div>
      <div class="success-msg" data-rsvp-success>
        Thank you for your confirmation!<br>See you there ✦
      </div>
    </div></div>
  `;
}

// ── BUILD ──────────────────────────────────────────────
let currentPage = 0;
let totalPages = 0;
let countdownTimer = null;

function build(data) {
  const wrap = document.getElementById('cardWrap');
  wrap.querySelectorAll('.page').forEach(p => p.remove());

  const sections = [];
  if (data.cover && data.cover.enabled !== false)         sections.push(['cover', data.cover]);
  if (data.countdown && data.countdown.enabled !== false) sections.push(['countdown', data.countdown]);
  if (data.locations && data.locations.enabled !== false && (data.locations.items || []).length) sections.push(['locations', data.locations]);
  if (data.gifts && data.gifts.enabled !== false && (data.gifts.items || []).length) sections.push(['gifts', data.gifts]);
  (data.customSections || []).forEach(s => { if (s.enabled !== false) sections.push(['custom', s]); });
  if (data.rsvp && data.rsvp.enabled !== false) sections.push(['rsvp', data.rsvp]);

  const npOverride = getMaxPeopleOverride();
  const maxPeople = npOverride || (data.rsvp && data.rsvp.maxPeople) || 10;

  totalPages = sections.length;
  currentPage = 0;
  sections.forEach(([type, cfg], i) => {
    const el = document.createElement('div');
    el.className = 'page' + (i === 0 ? ' active' : ' below');
    el.dataset.page = i;
    if (type === 'cover')      el.innerHTML = renderCover(cfg, true);
    if (type === 'countdown')  el.innerHTML = renderCountdown(cfg);
    if (type === 'locations')  el.innerHTML = renderLocations(cfg);
    if (type === 'gifts')      el.innerHTML = renderGifts(cfg);
    if (type === 'custom')     el.innerHTML = renderCustom(cfg);
    if (type === 'rsvp')       el.innerHTML = renderRsvp(cfg, maxPeople);
    wrap.insertBefore(el, document.getElementById('dots'));
  });

  buildDots();
  startCountdown();
  document.title = (data.title || (data.cover && data.cover.names) || 'Invitation') + ' — Invitation';
}

function buildDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  for (let i = 0; i < totalPages; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentPage ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    c.appendChild(d);
  }
}

function goTo(n) {
  if (n < 0 || n >= totalPages) return;
  document.querySelectorAll('.page').forEach((p, i) => {
    p.classList.remove('active', 'above', 'below');
    if (i === n) p.classList.add('active');
    else if (i < n) p.classList.add('above');
    else p.classList.add('below');
  });
  currentPage = n;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === n));
}

// ── COUNTDOWN ──────────────────────────────────────────
function startCountdown() {
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
  const node = document.querySelector('[data-countdown]');
  if (!node) return;
  const target = new Date(node.dataset.countdown + 'T00:00:00');
  const tick = () => {
    const diff = target - new Date();
    const els = node.querySelectorAll('[data-cd]');
    if (diff <= 0) { els.forEach(e => e.textContent = '0'); return; }
    const map = {
      d: Math.floor(diff / 86400000),
      h: Math.floor((diff % 86400000) / 3600000),
      m: Math.floor((diff % 3600000) / 60000),
      s: Math.floor((diff % 60000) / 1000)
    };
    els.forEach(e => e.textContent = map[e.dataset.cd]);
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

// ── EVENTS ─────────────────────────────────────────────
document.addEventListener('click', e => {
  if (e.target.closest('[data-action="next"]')) { goTo(currentPage + 1); return; }
  const copy = e.target.closest('[data-copy]');
  if (copy) {
    navigator.clipboard?.writeText(copy.dataset.copy).then(() => {
      const orig = copy.textContent;
      copy.textContent = 'Copied ✓';
      setTimeout(() => copy.textContent = orig, 1500);
    });
    return;
  }
  if (e.target.closest('[data-submit-rsvp]')) submitRSVP(e.target.closest('[data-submit-rsvp]'));
});

document.addEventListener('change', e => {
  if (e.target.matches('[data-num-attendees]')) buildNameFields(e.target);
});

function buildNameFields(sel) {
  const n = parseInt(sel.value) || 0;
  const wrap = sel.closest('[data-rsvp]').querySelector('[data-name-fields]');
  wrap.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'form-group';
    row.innerHTML = `<label class="form-label">Guest ${i + 1} name</label><input class="form-input guest-name" type="text" placeholder="Full name">`;
    wrap.appendChild(row);
  }
}

function submitRSVP(btn) {
  const form = btn.closest('[data-rsvp]');
  const att = form.querySelector('[data-attending]').value;
  const num = form.querySelector('[data-num-attendees]').value;
  const names = [...form.querySelectorAll('.guest-name')].map(i => i.value.trim());
  if (!att) return alert('Please select your attendance.');
  if (att === 'yes' && !num) return alert('Please select number of attendees.');
  if (att === 'yes' && names.some(n => !n)) return alert('Please fill in all guest names.');
  form.style.display = 'none';
  form.parentElement.querySelector('[data-rsvp-success]').style.display = 'block';
}

function setupSwipe() {
  const wrap = document.getElementById('cardWrap');
  let startY = 0, startX = 0;
  wrap.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startX = e.touches[0].clientX; }, { passive: true });
  wrap.addEventListener('touchend', e => {
    const dy = startY - e.changedTouches[0].clientY;
    const dx = Math.abs(startX - e.changedTouches[0].clientX);
    if (Math.abs(dy) > 40 && Math.abs(dy) > dx) {
      if (dy > 0) goTo(currentPage + 1); else goTo(currentPage - 1);
    }
  }, { passive: true });
  wrap.addEventListener('wheel', e => {
    if (e.deltaY > 30) goTo(currentPage + 1);
    else if (e.deltaY < -30) goTo(currentPage - 1);
  }, { passive: true });
}

window.addEventListener('DOMContentLoaded', () => {
  build(loadData());
  setupSwipe();
});
</script>
</body>
</html>
